<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智邻社区 - 居民端</title>
<style>
:root {
  --primary: #4F46E5; --primary-light: #6366F1; --primary-dark: #4338CA;
  --success: #10B981; --danger: #EF4444; --warning: #F59E0B;
  --bg: #0F172A; --bg-card: rgba(30,41,59,0.85); --bg-input: rgba(15,23,42,0.6);
  --text: #F1F5F9; --text-secondary: #94A3B8; --border: rgba(148,163,184,0.2);
  --glass: rgba(255,255,255,0.05); --glass-hover: rgba(255,255,255,0.1);
  --radius: 16px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
/* ===== Login / Register Page ===== */
.auth-bg {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at top left, rgba(79,70,229,0.25), transparent 50%),
              radial-gradient(ellipse at bottom right, rgba(16,185,129,0.15), transparent 50%),
              linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
}
.auth-card {
  position: relative; z-index: 1;
  width: 420px; max-width: 94vw;
  background: rgba(30,41,59,0.8); backdrop-filter: blur(40px);
  border: 1px solid var(--border); border-radius: 24px;
  padding: 48px 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to { opacity:1; transform: translateY(0); }
}
.auth-card h1 { font-size:28px; font-weight:700; text-align:center; margin-bottom:8px; letter-spacing:-0.5px; }
.auth-card p.sub { text-align:center; color:var(--text-secondary); font-size:14px; margin-bottom:32px; }

.input-group { margin-bottom:18px; }
.input-group label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; font-weight:500; }
.input-wrapper { position:relative; }
.input-wrapper input, .input-wrapper select, .input-wrapper textarea {
  width:100%; padding:12px 16px; padding-right:44px;
  background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--text); font-size:15px; outline:none; transition:border 0.2s, box-shadow 0.2s;
}
.input-wrapper textarea { resize:none; min-height:80px; padding-right:16px; }
.input-wrapper input:focus, .input-wrapper select:focus, .input-wrapper textarea:focus {
  border-color:var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
}
.pw-toggle {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:18px;
}
.btn {
  width:100%; padding:13px; border:none; border-radius:var(--radius-sm);
  font-size:16px; font-weight:600; cursor:pointer; transition: all 0.25s;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-light); transform:translateY(-1px); box-shadow:0 8px 25px rgba(79,70,229,0.35); }
.btn-secondary { background: transparent; border:1px solid var(--border); color:var(--text); margin-top:12px; }
.btn-secondary:hover { background:var(--glass); }
.btn-danger { background:var(--danger); color:#fff; }
.auth-link { text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary); }
.auth-link a { color:var(--primary-light); text-decoration:none; font-weight:600; cursor:pointer; }

/* Steps */
.steps { display:flex; justify-content:center; margin-bottom:28px; gap:8px; }
.step { width:32px; height:32px; border-radius:50%; background:var(--glass); border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;
  transition:all 0.3s; }
.step.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.step.done { background:var(--success); border-color:var(--success); color:#fff; }
.step-line { width:40px; height:2px; background:var(--border); align-self:center; }
.step-line.done { background:var(--success); }

/* ===== Main App ===== */
.app { display:none; width:100%; max-width:520px; padding:16px; margin:0 auto; }
.app.active { display:block; }
.top-bar { display:flex; justify-content:space-between; align-items:center; padding:16px 0; }
.top-bar h2 { font-size:22px; font-weight:700; }
.top-bar button { background:var(--glass); border:1px solid var(--border); color:var(--text); padding:8px 16px;
  border-radius:var(--radius-sm); cursor:pointer; font-size:14px; }
.top-bar button:hover { background:var(--glass-hover); }

.card {
  background:var(--bg-card); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; margin-bottom:16px;
}
.card h3 { font-size:17px; font-weight:600; margin-bottom:4px; }
.card .sub { font-size:13px; color:var(--text-secondary); }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid-3 { display:grid; grid-template-columns: repeat(3,1fr); gap:10px; }
.cat-item {
  background:var(--glass); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:16px 12px; text-align:center; cursor:pointer; transition:all 0.2s;
}
.cat-item:hover { background:var(--glass-hover); border-color:var(--primary); transform:translateY(-2px); }
.cat-item .icon { font-size:28px; margin-bottom:6px; }
.cat-item .label { font-size:13px; font-weight:600; }

.order-item {
  border-bottom:1px solid var(--border); padding:14px 0; cursor:pointer;
}
.order-item:last-child { border-bottom:none; }
.order-item .row { display:flex; justify-content:space-between; align-items:center; }
.order-item .id { font-weight:700; font-size:14px; }
.order-item .status { font-size:12px; padding:3px 10px; border-radius:12px; font-weight:600; }
.status-pending { background:rgba(245,158,11,0.2); color:#F59E0B; }
.status-accepted { background:rgba(59,130,246,0.2); color:#3B82F6; }
.status-progress { background:rgba(79,70,229,0.2); color:#818CF8; }
.status-completed { background:rgba(16,185,129,0.2); color:#10B981; }
.order-item .desc { font-size:13px; color:var(--text-secondary); margin-top:4px; }
.order-item .price { font-weight:700; color:var(--primary-light); }

.tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600;
  background:rgba(79,70,229,0.2); color:#A5B4FC; margin-right:6px; }

.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  z-index:100; display:flex; align-items:center; justify-content:center;
}
.modal {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:28px; width:90%; max-width:440px; max-height:85vh; overflow-y:auto;
}
.modal h3 { margin-bottom:20px; }

.price-hint { font-size:12px; color:var(--text-secondary); margin-top:4px; }
.price-error { font-size:12px; color:var(--danger); margin-top:4px; display:none; }

.empty { text-align:center; padding:32px; color:var(--text-secondary); }

.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  padding:12px 24px; border-radius:var(--radius-sm); font-weight:600; font-size:14px;
  z-index:200; animation: slideDown 0.3s ease;
}
.toast.success { background:var(--success); color:#fff; }
.toast.error { background:var(--danger); color:#fff; }
@keyframes slideDown { from { transform:translateX(-50%) translateY(-40px); opacity:0; } }

.nav-tabs { display:flex; gap:4px; background:var(--glass); border-radius:var(--radius-sm); padding:4px; margin-bottom:16px; }
.nav-tab { flex:1; text-align:center; padding:10px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600;
  transition:all 0.2s; color:var(--text-secondary); }
.nav-tab.active { background:var(--primary); color:#fff; }
</style>
</head>
<body>
<div class="auth-bg" id="authBg"></div>
<div class="auth-card" id="authCard">
  <!-- Dynamic: login / register step1 / register step2 -->
</div>
<div class="app" id="app">
  <div id="appContent"></div>
</div>

<script>
const API = '';
let token = '', user = null;

function showToast(msg, type='success') {
  const t = document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || data.message || '请求失败');
  return data;
}

// ==================== Auth ====================
function renderLogin() {
  document.getElementById('authBg').style.display='block';
  document.getElementById('authCard').innerHTML = `
    <h1>居民登录</h1>
    <p class="sub">欢迎回到智邻社区</p>
    <div class="input-group"><label>手机号</label>
      <div class="input-wrapper"><input id="loginPhone" placeholder="输入手机号"></div></div>
    <div class="input-group"><label>密码</label>
      <div class="input-wrapper"><input id="loginPw" type="password" placeholder="输入密码">
        <button class="pw-toggle" onclick="togglePw('loginPw',this)">👁</button></div></div>
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
    <div class="auth-link">没有账号？<a onclick="renderRegisterStep1()">注册</a></div>
    <button class="btn btn-secondary" onclick="renderProviderLogin()">切换到服务者端</button>
    <button class="btn btn-secondary" onclick="renderAdminLogin()">管理端入口</button>
  `;
}

function renderRegisterStep1() {
  document.getElementById('authCard').innerHTML = `
    <h1>居民注册</h1>
    <p class="sub">加入智邻社区，享受便捷服务</p>
    <div class="steps">
      <div class="step active">1</div><div class="step-line"></div><div class="step">2</div>
    </div>
    <div class="input-group"><label>手机号</label>
      <div class="input-wrapper"><input id="regPhone" placeholder="输入手机号"></div></div>
    <div class="input-group"><label>密码</label>
      <div class="input-wrapper"><input id="regPw" type="password" placeholder="至少6位">
        <button class="pw-toggle" onclick="togglePw('regPw',this)">👁</button></div></div>
    <button class="btn btn-primary" onclick="toStep2()">下一步</button>
    <div class="auth-link"><a onclick="renderLogin()">返回登录</a></div>
  `;
}

function renderRegisterStep2(phone, password) {
  document.getElementById('authCard').innerHTML = `
    <h1>完善资料</h1>
    <p class="sub">让服务者更好地了解您</p>
    <div class="steps">
      <div class="step done">✓</div><div class="step-line done"></div><div class="step active">2</div>
    </div>
    <div class="input-group"><label>昵称</label>
      <div class="input-wrapper"><input id="regNick" placeholder="您的昵称"></div></div>
    <div class="input-group"><label>地址</label>
      <div class="input-wrapper"><input id="regAddr" placeholder="例如：幸福小区 X栋XXX"></div></div>
    <button class="btn btn-primary" onclick="doRegister('${phone}','${password}')">完成注册</button>
    <div class="auth-link"><a onclick="renderRegisterStep1()">返回上一步</a></div>
  `;
}

function toStep2() {
  const phone = document.getElementById('regPhone').value.trim();
  const pw = document.getElementById('regPw').value;
  if (!phone || !pw) return showToast('请填写完整', 'error');
  if (pw.length < 6) return showToast('密码至少6位', 'error');
  renderRegisterStep2(phone, pw);
}

function togglePw(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type==='password'?'text':'password';
  btn.textContent = el.type==='password'?'👁':'🙈';
}

async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const password = document.getElementById('loginPw').value;
  if (!phone || !password) return showToast('请输入手机号和密码', 'error');
  try {
    const res = await api('/auth/login/resident', 'POST', { phone, password });
    token = res.data.access_token; user = { id: res.data.user_id, nickname: res.data.nickname, role: res.data.role };
    document.getElementById('authBg').style.display='none';
    document.getElementById('authCard').style.display='none';
    document.getElementById('app').classList.add('active');
    renderHome();
  } catch(e) { showToast(e.message, 'error'); }
}

async function doRegister(phone, password) {
  const nick = document.getElementById('regNick').value.trim();
  const addr = document.getElementById('regAddr').value.trim();
  if (!nick || !addr) return showToast('请填写完整', 'error');
  try {
    const res = await api('/auth/register/resident', 'POST', {
      phone, password, nickname: nick, address: addr, latitude: 30.5728, longitude: 104.0668
    });
    token = res.data.access_token; user = { id: res.data.user_id, nickname: res.data.nickname, role: res.data.role };
    document.getElementById('authBg').style.display='none';
    document.getElementById('authCard').style.display='none';
    document.getElementById('app').classList.add('active');
    renderHome();
  } catch(e) { showToast(e.message, 'error'); }
}

// ==================== Main App ====================
function renderHome() {
  document.getElementById('appContent').innerHTML = `
    <div class="top-bar"><h2>智邻社区</h2>
      <button onclick="logout()">退出</button></div>
    <div class="card">
      <h3>👋 欢迎，${user.nickname || user.phone}</h3>
      <p class="sub">今天需要什么服务？</p>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchTab('home',this)">首页</div>
      <div class="nav-tab" onclick="switchTab('orders',this)">我的订单</div>
    </div>
    <div id="tabContent"></div>
  `;
  renderHomeTab();
}

function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if (tab==='home') renderHomeTab();
  else if (tab==='orders') renderOrdersTab();
}

function renderHomeTab() {
  document.getElementById('tabContent').innerHTML = `
    <div class="card"><h3>服务分类</h3><p class="sub">选择需要的服务类型</p></div>
    <div class="grid-3">${[
      {icon:'🔧',label:'维修',cat:'REPAIR'},
      {icon:'🧹',label:'保洁',cat:'CLEANING'},
      {icon:'📦',label:'搬家',cat:'MOVING'},
      {icon:'📚',label:'家教',cat:'TUTORING'},
      {icon:'👴',label:'养老',cat:'ELDERLY_CARE'},
      {icon:'📋',label:'其他',cat:'OTHER'}
    ].map(c=>`<div class="cat-item" onclick="showOrderModal('${c.cat}','${c.label}')">
      <div class="icon">${c.icon}</div><div class="label">${c.label}</div></div>`).join('')}</div>
  `;
}

async function showOrderModal(cat, label) {
  // Fetch price guide for this category
  let minPrice = 0;
  try {
    const r = await api(`/price-guide?category=${cat}`);
    if (r.data?.price_guides?.length) minPrice = Math.min(...r.data.price_guides.map(p=>p.price_min));
  } catch(e) {}

  const overlay = document.createElement('div'); overlay.className='modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>📋 下单 - ${label}</h3>
      <div class="input-group"><label>描述</label>
        <div class="input-wrapper"><textarea id="orderDesc" placeholder="请描述您的需求..."></textarea></div></div>
      <div class="input-group"><label>地址</label>
        <div class="input-wrapper"><input id="orderAddr" value="${user.address || '幸福小区'}"></div></div>
      <div class="input-group"><label>您的出价 (元)</label>
        <div class="input-wrapper"><input id="orderPrice" type="number" placeholder="出价" oninput="checkMinPrice(${minPrice})"></div>
        <div class="price-hint">该类服务参考最低价：¥${minPrice}</div>
        <div class="price-error" id="priceErr">出价不能低于参考最低价 ¥${minPrice}</div></div>
      <p class="sub" style="margin-bottom:16px;">预付 50%：<span id="prepaidShow">¥0.00</span> | 平台服务费：3%</p>
      <button class="btn btn-primary" onclick="doCreateOrder('${cat}','${label}')">确认下单</button>
      <button class="btn btn-secondary" style="margin-top:8px;" onclick="this.closest('.modal-overlay').remove()">取消</button>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('orderPrice').addEventListener('input', function() {
    const v = parseFloat(this.value)||0;
    document.getElementById('prepaidShow').textContent = '¥'+(v*0.5).toFixed(2);
  });
}

window.checkMinPrice = function(min) {
  const v = parseFloat(document.getElementById('orderPrice').value)||0;
  document.getElementById('priceErr').style.display = v < min ? 'block' : 'none';
};

async function doCreateOrder(cat, label) {
  const desc = document.getElementById('orderDesc').value.trim();
  const addr = document.getElementById('orderAddr').value.trim();
  const price = parseFloat(document.getElementById('orderPrice').value);
  if (!desc||!addr||!price) return showToast('请填写完整','error');

  try {
    const res = await api('/resident/orders','POST',{
      title:`${label}服务`,description:desc,address:addr,category:cat,
      latitude:30.5728,longitude:104.0668,total_price:price
    });
    document.querySelector('.modal-overlay').remove();
    showToast(`下单成功！订单号：${res.data.order_no}`);
    renderOrdersTab();
  } catch(e) { showToast(e.message,'error'); }
}

async function renderOrdersTab() {
  document.getElementById('tabContent').innerHTML = '<div class="card"><h3>我的订单</h3></div><div id="orderList"><p class="empty">加载中...</p></div>';
  try {
    const r = await api(`/resident/orders?user_id=${user.id}`);
    const orders = r.data?.orders || [];
    const html = orders.length ? orders.map(o=>`
      <div class="order-item" onclick="showOrderDetail(${o.id})">
        <div class="row"><span class="id">#${o.order_no}</span>
          <span class="status status-${statusClass(o.status)}">${statusLabel(o.status)}</span></div>
        <div class="desc">${o.category} · ${o.description}</div>
        <div class="row" style="margin-top:6px">
          <span class="price">¥${o.amount||o.total_price||0}</span>
          <span style="font-size:12px;color:var(--text-secondary)">预付:${o.prepaid_status||'N/A'}</span>
        </div>
      </div>`).join('') : '<p class="empty">暂无订单</p>';
    document.getElementById('orderList').innerHTML = html;
  } catch(e) { document.getElementById('orderList').innerHTML = '<p class="empty">加载失败</p>'; }
}

function statusLabel(s) {
  const m={'PENDING':'待接单','ACCEPTED':'已接单','IN_PROGRESS':'服务中','WAITING_CONFIRM':'待确认','WAITING_REVIEW':'待评价','COMPLETED':'已完成','CANCELLED':'已取消'};
  return m[s]||s;
}
function statusClass(s) {
  const m={'PENDING':'pending','ACCEPTED':'accepted','IN_PROGRESS':'progress','WAITING_CONFIRM':'pending','WAITING_REVIEW':'pending','COMPLETED':'completed'};
  return m[s]||'pending';
}

async function showOrderDetail(orderId) {
  try {
    const r = await api(`/resident/orders?user_id=${user.id}`);
    const o = (r.data?.orders||[]).find(x=>x.id===orderId);
    if (!o) return;
    const overlay = document.createElement('div'); overlay.className='modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h3>订单详情 #${o.order_no}</h3>
        <p style="color:var(--text-secondary);font-size:14px;">${o.category} | ${statusLabel(o.status)}</p>
        <p style="margin:8px 0">${o.description}</p>
        <p>金额：¥${o.amount||o.total_price||0}</p>
        <p>预付状态：${o.prepaid_status||'N/A'}</p>
        ${(o.status==='PENDING'&&o.prepaid_status==='UNPAID') ? `<button class="btn btn-primary" style="margin-top:12px" onclick="payOrder(${o.id})">支付预付 ¥${((o.amount||o.total_price||0)*0.5).toFixed(2)}</button>` : ''}
        ${o.status==='WAITING_CONFIRM' ? `<button class="btn btn-primary" style="margin-top:12px" onclick="confirmOrder(${o.id})">确认完成</button>` : ''}
        ${o.status==='WAITING_REVIEW' ? `<button class="btn btn-primary" style="margin-top:12px" onclick="reviewOrder(${o.id})">去评价</button>` : ''}
        <button class="btn btn-secondary" style="margin-top:8px" onclick="this.closest('.modal-overlay').remove()">关闭</button>
      </div>`;
    document.body.appendChild(overlay);
  } catch(e) { showToast('加载失败','error'); }
}

async function payOrder(orderId) {
  try {
    await api(`/resident/orders/${orderId}/pay`,'POST');
    showToast('支付成功！');
    document.querySelector('.modal-overlay').remove();
    renderOrdersTab();
  } catch(e) { showToast(e.message,'error'); }
}

async function confirmOrder(orderId) {
  try {
    await api(`/resident/orders/${orderId}/confirm`,'POST',{});
    showToast('已确认完成！');
    document.querySelector('.modal-overlay').remove();
    renderOrdersTab();
  } catch(e) { showToast(e.message,'error'); }
}

function reviewOrder(orderId) {
  document.querySelector('.modal-overlay')?.remove();
  const overlay = document.createElement('div'); overlay.className='modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>评价服务者</h3>
      ${['服务态度','专业性','守时程度','性价比','售后体验'].map((d,i)=>`
        <div class="input-group"><label>${d} (1-5分)</label>
          <div class="input-wrapper"><input type="number" id="score${i}" min="1" max="5" value="5"></div></div>`).join('')}
      <div class="input-group"><label>评语</label>
        <div class="input-wrapper"><textarea id="reviewComment" placeholder="简单写几句..."></textarea></div></div>
      <button class="btn btn-primary" onclick="doReview(${orderId})">提交评价</button>
      <button class="btn btn-secondary" style="margin-top:8px" onclick="this.closest('.modal-overlay').remove()">取消</button>
    </div>`;
  document.body.appendChild(overlay);
}

async function doReview(orderId) {
  const scores = [0,1,2,3,4].map(i=>parseInt(document.getElementById(`score${i}`).value)||5);
  const comment = document.getElementById('reviewComment').value;
  try {
    await api(`/resident/reviews?order_id=${orderId}`,'POST',{
      resident_id: user.id,
      resident_attitude:5, professionalism:scores[1], punctuality:scores[2], cost:scores[3], after_sale:scores[4],
      comment
    });
    showToast('评价成功！');
    document.querySelector('.modal-overlay').remove();
    renderOrdersTab();
  } catch(e) { showToast(e.message,'error'); }
}

function logout() {
  token=''; user=null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('authBg').style.display='block';
  document.getElementById('authCard').style.display='block';
  renderLogin();
}

// ==================== Navigation ====================
function renderProviderLogin() {
  window.location.href = '/provider.html';
}
function renderAdminLogin() {
  window.location.href = '/admin.html';
}

// Init
renderLogin();
</script>
</body>
