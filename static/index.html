<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智邻社区 - 社区服务平台</title>
<style>
  :root {
    --primary: #4F46E5;
    --primary-light: #6366F1;
    --bg: #F3F4F6;
    --card: #FFFFFF;
    --text: #1F2937;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ====== AI 悬浮按钮 ====== */
  .ai-float-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(79,70,229,0.35);
    z-index: 9998;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .ai-float-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(79,70,229,0.5); }
  .ai-float-btn svg { width: 28px; height: 28px; }
  .ai-float-btn .close-icon { display: none; }
  .ai-float-btn.open .chat-icon { display: none; }
  .ai-float-btn.open .close-icon { display: block; }

  /* ====== AI 聊天面板 ====== */
  .ai-chat-panel {
    position: fixed;
    bottom: 96px;
    right: 24px;
    width: 380px;
    max-height: 520px;
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    z-index: 9997;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px) scale(0.95);
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
  }
  .ai-chat-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .ai-chat-header {
    background: var(--primary);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ai-chat-header h3 { font-size: 15px; font-weight: 600; }
  .ai-chat-header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  .ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 360px;
  }
  .ai-chat-messages::-webkit-scrollbar { width: 4px; }
  .ai-chat-messages::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 2px; }

  .chat-msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg.user { align-self: flex-end; }
  .chat-msg.assistant { align-self: flex-start; }

  .chat-msg .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .chat-msg.user .bubble {
    background: var(--primary);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-msg.assistant .bubble {
    background: #F3F4F6;
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .chat-msg .time {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    padding: 0 4px;
  }
  .chat-msg.user .time { text-align: right; }

  .typing-indicator {
    align-self: flex-start;
    background: #F3F4F6;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
    display: none;
  }
  .typing-indicator.active { display: flex; gap: 4px; align-items: center; }
  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #9CA3AF;
    animation: typeBounce 1.4s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typeBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .ai-chat-input {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    gap: 8px;
  }
  .ai-chat-input input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .ai-chat-input input:focus { border-color: var(--primary); }
  .ai-chat-input button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .ai-chat-input button:hover { background: var(--primary-light); }
  .ai-chat-input button:disabled { opacity: 0.5; cursor: default; }
  .ai-chat-input button svg { width: 18px; height: 18px; }

  /* 快捷提问 */
  .quick-asks {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 12px;
  }
  .quick-asks button {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-asks button:hover { border-color: var(--primary); color: var(--primary); }
</style>
</head>
<body>

<!-- ========== AI 悬浮助手 ========== -->
<button class="ai-float-btn" id="aiFloatBtn" title="AI 助手">
  <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
  </svg>
  <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<div class="ai-chat-panel" id="aiChatPanel">
  <div class="ai-chat-header">
    <div>
      <h3>智邻 AI 助手</h3>
      <div class="subtitle">7×24h 智能答疑</div>
    </div>
  </div>
  <div class="ai-chat-messages" id="aiMessages">
    <div class="chat-msg assistant">
      <div class="bubble">你好！我是智邻社区 AI 助手。可以问我服务价格、平台使用、下单接单等问题～</div>
      <div class="time">刚刚</div>
    </div>
  </div>
  <div class="typing-indicator" id="aiTyping">
    <span></span><span></span><span></span>
  </div>
  <div class="quick-asks" id="quickAsks">
    <button onclick="sendQuick('水管漏水维修大概多少钱？')">水管维修价格</button>
    <button onclick="sendQuick('日常保洁怎么收费？')">保洁收费</button>
    <button onclick="sendQuick('如何投诉服务者？')">如何投诉</button>
    <button onclick="sendQuick('服务者怎么接单？')">怎么接单</button>
  </div>
  <div class="ai-chat-input">
    <input type="text" id="aiInput" placeholder="输入问题..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="aiSendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const chatHistory = [];

  document.getElementById('aiFloatBtn').addEventListener('click', () => {
    const btn = document.getElementById('aiFloatBtn');
    const panel = document.getElementById('aiChatPanel');
    btn.classList.toggle('open');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      document.getElementById('aiInput').focus();
    }
  });

  function addMessage(role, text) {
    const container = document.getElementById('aiMessages');
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    const msgDiv = document.createElement('div');
    msgDiv.className = 'chat-msg ' + role;
    msgDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="time">${timeStr}</div>`;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function sendMessage() {
    const input = document.getElementById('aiInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendQuick(text);
  }

  async function sendQuick(text) {
    const sendBtn = document.getElementById('aiSendBtn');
    const typing = document.getElementById('aiTyping');
    const quickAsks = document.getElementById('quickAsks');

    addMessage('user', text);
    chatHistory.push({ role: 'user', content: text });

    sendBtn.disabled = true;
    typing.classList.add('active');

    try {
      const resp = await fetch('/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatHistory, temperature: 0.7 })
      });
      const result = await resp.json();
      typing.classList.remove('active');

      if (result.code === 200) {
        const reply = result.data.reply;
        addMessage('assistant', reply);
        chatHistory.push({ role: 'assistant', content: reply });
      } else {
        addMessage('assistant', '抱歉，出了点问题，请稍后再试。');
      }
    } catch (e) {
      typing.classList.remove('active');
      addMessage('assistant', '网络连接失败，请检查服务是否启动。');
    }

    sendBtn.disabled = false;

    // 用户发过消息后，隐藏快捷提问
    if (quickAsks.style.display !== 'none') {
      quickAsks.style.display = 'none';
    }
  }
</script>

</body>
</html>
